<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Meta tag estricto para móviles, previene el zoom táctil accidental del navegador -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Hub Kinopio</title>
    
    <style>
        /* Reseteo para eliminar bordes blancos por defecto */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Configuración de fondo con un tono aesthetic/pastel y bloqueo de scroll nativo */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #fff0f5; 
            font-family: sans-serif;
        }

        /* El contenedor abarca el 100% del alto y ancho del dispositivo móvil */
        .kinopio-embed {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        /* Tu iframe se expande dinámicamente sin bordes para parecer una app nativa */
        .kinopio-embed iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Contenedor inmersivo -->
    <div class="kinopio-embed">
        <!-- Utilizamos tu enlace exacto con el zoom=40 nativo de Kinopio -->
        <iframe 
            src="https://kinopio.club/embed/?spaceId=axmzTe2qohG25gtwoXFDc&zoom=40" 
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
